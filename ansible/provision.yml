---
- name: Provision App VM
  hosts: app
  become: true

  vars:
    app_dir: /opt/app
    frontend_port: 5173
    domain_name: urugendo-app.southafricanorth.cloudapp.azure.com

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install essential packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - openssl
          - python3-pip
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_facts['lsb']['codename'] }} stable"
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Reset failed docker units if any
      command: systemctl reset-failed docker.service docker.socket
      ignore_errors: yes
      changed_when: false

    - name: Daemon reload
      systemd:
        daemon_reload: yes

    - name: Enable and start docker socket
      systemd:
        name: docker.socket
        state: started
        enabled: true

    - name: Add azureuser to docker group
      user:
        name: azureuser
        groups: docker
        append: yes

    - name: Configure Docker log rotation
      copy:
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
        dest: /etc/docker/daemon.json
        mode: '0644'
      notify: Restart Docker

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Increase server_names_hash_bucket_size
      lineinfile:
        path: /etc/nginx/nginx.conf
        regexp: '# server_names_hash_bucket_size'
        line: '	server_names_hash_bucket_size 128;'
      notify: Reload Nginx

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload Nginx

    - name: Generate self-signed SSL certificate
      command: >
        openssl req -x509 -nodes -days 365 -newkey rsa:2048
        -keyout /etc/ssl/private/urugendo.key
        -out /etc/ssl/certs/urugendo.crt
        -subj "/CN={{ domain_name }}"
      args:
        creates: /etc/ssl/certs/urugendo.crt

    - name: Configure Nginx with HTTPS
      copy:
        content: |
          server {
              listen 443 ssl;
              server_name {{ domain_name }};

              ssl_certificate /etc/ssl/certs/urugendo.crt;
              ssl_certificate_key /etc/ssl/private/urugendo.key;

              add_header X-Frame-Options "SAMEORIGIN" always;
              add_header X-Content-Type-Options "nosniff" always;
              add_header X-XSS-Protection "1; mode=block" always;

              location / {
                  proxy_pass http://127.0.0.1:{{ frontend_port }};
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 86400;
              }

              location /api/ {
                  proxy_pass http://127.0.0.1:8000/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 300;
                  proxy_connect_timeout 300;
                  proxy_send_timeout 300;
              }

              location /health {
                  access_log off;
                  return 200 "healthy\n";
                  add_header Content-Type text/plain;
              }

              location /django-admin/ {
                proxy_pass http://127.0.0.1:8000/django-admin/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }
              
              location /static/ {
                proxy_pass http://127.0.0.1:8000/static/;
              }
            }

          server {
              listen 80;
              server_name {{ domain_name }};
              return 301 https://$host$request_uri;
          }
        dest: /etc/nginx/conf.d/app.conf
        mode: '0644'
      notify: Reload Nginx

    - name: Test Nginx config
      command: nginx -t
      changed_when: false

    - name: Start and enable Nginx
      systemd:
        name: nginx
        state: started
        enabled: true

  handlers:
    - name: Restart Docker
      systemd:
        name: docker
        state: restarted

    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded
