---
- name: Deploy application to production
  hosts: app
  become: yes

  vars:
    app_dir: /opt/app
    registry_url: "{{ registry_url }}"
    registry_username: "{{ registry_username }}"
    registry_password: "{{ registry_password }}"
    image_name: "{{ image_name }}"
    image_tag: "{{ image_tag | default('latest') }}"
    deploy_backend: "{{ deploy_backend | default('true') }}"
    deploy_frontend: "{{ deploy_frontend | default('true') }}"

  tasks:
    - name: Ensure app directory exists
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Login to ACR
      shell: |
        echo "{{ registry_password }}" | docker login {{ registry_url }} \
          -u "{{ registry_username }}" --password-stdin
      no_log: true
      changed_when: false

    - name: Write docker-compose file
      template:
        src: templates/docker-compose.yml.j2
        dest: "{{ app_dir }}/docker-compose.yml"
        mode: '0644'

    - name: Write backend env file
      when: deploy_backend | bool
      copy:
        content: |
          SECRET_KEY={{ secret_key }}
          DEBUG=False
          ALLOWED_HOST={{ allowed_host }}
          FRONTEND_URL={{ frontend_url }}
          AZURE_DB_HOST={{ db_host }}
          AZURE_DB_PORT={{ db_port }}
          AZURE_DB_NAME={{ db_name }}
          AZURE_DB_USER={{ db_user }}
          AZURE_DB_PASSWORD={{ db_password }}
          JWT_ACCESS_TOKEN_LIFETIME={{ jwt_access_lifetime }}
          JWT_REFRESH_TOKEN_LIFETIME={{ jwt_refresh_lifetime }}
          JWT_SECRET_KEY={{ jwt_secret }}
          JWT_ALGORITHM=HS256
          GOOGLE_CLIENT_ID={{ google_client_id }}
          GOOGLE_CLIENT_SECRET={{ google_client_secret }}
          GOOGLE_REFRESH_TOKEN={{ google_refresh_token }}
          GMAIL_SENDER_EMAIL={{ gmail_sender }}
          GOOGLE_CALENDAR_CLIENT_ID={{ google_calendar_client_id }}
          GOOGLE_CALENDAR_CLIENT_SECRET={{ google_calendar_client_secret }}
          GOOGLE_CALENDAR_REDIRECT_URI={{ google_calendar_redirect_uri }}
          OAUTHLIB_INSECURE_TRANSPORT=1
          GOOGLE_MAPS_API_KEY={{ google_maps_api_key }}
          AZURE_TRANSLATOR_KEY={{ azure_translator_key }}
          AZURE_TRANSLATOR_REGION={{ azure_translator_region }}
          AZURE_TRANSLATOR_ENDPOINT={{ azure_translator_endpoint }}
          SUPABASE_URL={{ supabase_url }}
          SUPABASE_KEY={{ supabase_key }}
        dest: "{{ app_dir }}/.env.backend"
        mode: '0600'
      no_log: true

    - name: Write frontend env file
      when: deploy_frontend | bool
      copy:
        content: |
          VITE_API_BASE_URL={{ vite_api_base_url }}
          VITE_API_TIMEOUT={{ vite_api_timeout }}
          VITE_DEV={{ dev }}
          VITE_GOOGLE_MAPS_API_KEY={{ vite_google_maps_api_key }}
          VITE_AZURE_TRANSLATOR_KEY={{ vite_azure_translator_key }}
          VITE_AZURE_TRANSLATOR_REGION={{ vite_azure_translator_region }}
          VITE_AZURE_TRANSLATOR_ENDPOINT={{ vite_azure_translator_endpoint }}
        dest: "{{ app_dir }}/.env.frontend"
        mode: '0600'
      no_log: true

    - name: Pull backend image
      when: deploy_backend | bool
      command: docker pull {{ registry_url }}/{{ image_name }}-backend:{{ image_tag }}

    - name: Pull frontend image
      when: deploy_frontend | bool
      command: docker pull {{ registry_url }}/{{ image_name }}-frontend:{{ image_tag }}

    # Selective restart: only restart the changed service(s) without
    # taking down the other. Falls back to a full restart if both changed.
    - name: Restart backend container only
      when: (deploy_backend | bool) and not (deploy_frontend | bool)
      command: docker compose -f {{ app_dir }}/docker-compose.yml up -d --no-deps backend
      args:
        chdir: "{{ app_dir }}"

    - name: Restart frontend container only
      when: (deploy_frontend | bool) and not (deploy_backend | bool)
      command: docker compose -f {{ app_dir }}/docker-compose.yml up -d --no-deps frontend
      args:
        chdir: "{{ app_dir }}"

    - name: Full restart (both changed)
      when: (deploy_backend | bool) and (deploy_frontend | bool)
      block:
        - name: Stop all containers
          command: docker compose -f {{ app_dir }}/docker-compose.yml down
          args:
            chdir: "{{ app_dir }}"
          ignore_errors: yes

        - name: Start all containers
          command: docker compose -f {{ app_dir }}/docker-compose.yml up -d
          args:
            chdir: "{{ app_dir }}"

    - name: Wait for backend to be healthy
      when: deploy_backend | bool
      uri:
        url: "http://localhost:8000/"
        status_code: [200, 404]
        timeout: 30
      register: backend_health
      until: backend_health.status in [200, 404]
      retries: 20
      delay: 15
      ignore_errors: yes

    - name: Create superuser
      when: deploy_backend | bool
      command: >
        docker exec urugendo-backend python /app/Urugendo/manage.py shell -c
        "from Users.models import User;
        User.objects.filter(username='{{ superuser_username }}').exists() or
        User.objects.create_superuser(
          username='{{ superuser_username }}',
          email='{{ superuser_email }}',
          password='{{ superuser_password }}'
        )"
      no_log: true

    - name: Set up django-q2 schedules
      when: deploy_backend | bool
      command: >
        docker exec urugendo-backend python /app/Urugendo/manage.py shell -c
        "from scheduler import setup_schedules; setup_schedules()"

    - name: Wait for frontend to be healthy
      when: deploy_frontend | bool
      uri:
        url: "http://localhost:5173/"
        status_code: 200
      register: frontend_health
      until: frontend_health.status == 200
      retries: 15
      delay: 5
      ignore_errors: yes

    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded

    - name: Show running containers
      command: >
        docker ps --format "table {% raw %}{{.Names}}\t{{.Status}}\t{{.Ports}}{% endraw %}"
      register: container_status
      changed_when: false

    - name: Deployment summary
      debug:
        msg:
          - "Deployment complete!"
          - "Components deployed: {{ 'backend ' if deploy_backend | bool else '' }}{{ 'frontend' if deploy_frontend | bool else '' }}"
          - "{{ container_status.stdout_lines }}"
          - "Backend: {{ 'OK' if (not deploy_backend | bool) else ('OK' if backend_health.status in [200, 404] else 'FAILED') }}"
          - "Frontend: {{ 'OK' if (not deploy_frontend | bool) else ('OK' if frontend_health.status == 200 else 'FAILED') }}"
          - "App URL: https://urugendo-app.southafricanorth.cloudapp.azure.com"

    - name: Clean up old images
      shell: docker image prune -af
      changed_when: false
